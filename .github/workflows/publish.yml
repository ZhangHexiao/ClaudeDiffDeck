name: Publish to VS Code Marketplace

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build

      - name: Publish to Marketplace
        run: npx vsce publish --no-git-tag-version -p ${{ secrets.VSCE_PAT }}
